baseURL: 'https://ehri-de.org/'
languageCode: en
title: Germany
theme: ehri-nn
copyright: '© 2010-{year} EHRI Consortium.'
defaultContentLanguage: en
dateFormat: '2 January 2006'
summaryLength: 40
params:
  titleShort: EHRI-DE
  facebookUrl: 'https://www.facebook.com/people/Ehri-de/61560414411928/'
  linkedinUrl: 'https://www.linkedin.com/company/ehri-de?trk=blended-typeahead'
  blueskyUrl: 'https://bsky.app/profile/ehri-de.bsky.social'

  headerLogo: images/ehri-logo-en.svg

  # `contactName` and `contactEmail` are used to populate the contact page.
  contactName: EHRI-DE
  contactEmail: meerwald@ifz-muenchen.de

  # `contactForm` is a boolean that determines whether the contact form should be shown.
  contactForm: false

  # `contactFormUrl` is the POST action of the form that will be used to send the contact email.
  contactFormUrl: dummy

  # `funders` is a list of funding bodies, each with a name, logo and an optional URL.
  # If the URL is not provided, the logo will not be linked. The logo should be in the
  # `static/images` folder.
  funders:
    - name: EHRI-DE wird vom Bundesministerium für Forschung, Technologie und Raumfahrt (BMFTR) gefördert.
      logo: 'bmftr.jpg'
      url: 'https://www.bmftr.bund.de/DE/Home/home_node.html'

# Configure syntax highlighting for the examples on the `training` page
markup:
  highlight:
    style: xcode

# Configure taxonomy terms
taxonomies:
  - name: category
    weight: 1
  - name: tag
    weight: 2

# Menu configuration. Labels, which should correspond to
# to the identifier, are in the i18n folders:
menu:
  main:
    - identifier: about
      pageRef: about
      weight: 20
    - identifier: news
      pageRef: news
      weight: 30
    - identifier: partners
      pageRef: partners
      weight: 40
    - identifier: de_services
      pageRef: ehri-de-services
      weight: 50
    - identifier: services
      pageRef: ehri-services
      weight: 60
    - identifier: contact
      pageRef: contact
      weight: 70
  footer:
    - identifier: about
      pageRef: about
      weight: 20
    - identifier: partners
      pageRef: partners
      weight: 30
    - identifier: legal
      pageRef: legal
      weight: 40
  services:
    - identifier: portal
      pageRef: 'https://portal.ehri-project.eu/'
      weight: 10
    - identifier: document_blog
      pageRef: 'https://blog.ehri-project.eu/'
      weight: 20
    - identifier: digital_tools_guide
      pageRef: 'https://github.com/EHRI/ehri-data-analysis-tools'
      weight: 30
    - identifier: podcast
      pageRef: 'https://www.ehri-project.eu/ehri-podcast-for-the-living-and-the-dead'
      weight: 40


# Languages
languages:
  en:
    title: Germany
    weight: 1
    languageName: English
  de:
    title: Deutschland
    weight: 2
    languageName: Deutsch

    params:
      headerLogo: images/ehri-logo-de.svg
