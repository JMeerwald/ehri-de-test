---
- id: arolsen
  title: Das Online Archiv der Arolsen Archives
  url: https://collections.arolsen-archives.org/
  icon: meeting_room
  image: arolsen-archiv_neu.jpg
  content: |
    Das umfangreiche Online-Archiv der Arolsen Archives bietet den Nutzern aktuell Zugriff auf 40 Millionen Dokumente und wird kontinuierlich ausgebaut. Jährlich greifen rund 700.000 Menschen auf diese zentrale Quelle zur NS-Verfolgung zu. Der von den Arolsen Archives als digitales Hilfsmittel erstellte e-Guide hilft den Nutzern, die Dokumente besser zu verstehen.

- id: everynamecounts
  title: everynamecounts
  url: https://everynamecounts.arolsen-archives.org/
  icon: meeting_room
  image: everynamecounts.png
  content: |
    #everynamecounts lädt Freiwillige dazu ein, am größten digitalen Denkmal für die Opfer und Überlebenden des Nationalsozialismus mitzuarbeiten. Die Crowdsourcing-Initiative macht es leicht, selbst ein Zeichen zu setzen und aktiv zu werden. Wer mithelfen möchte, braucht lediglich ein Smartphone oder einen Computer mit Internetzugang und ein paar Minuten Zeit, um die Namen und Informationen von den Original-Dokumenten zu digitalisieren.

- id: lastseen
  title: LastSeen
  url: https://atlas.lastseen.org/
  icon: meeting_room
  image: lastseen_neu.jpg
  content: |
    Im #LastSeen Bildatlas werden alle überlieferten Bilder von Deportationen aus dem Deutschen Reich zwischen 1938 und 1945 in kuratierter und wissenschaftlich kontextualisierter Form digital veröffentlicht. Durch die komplexe Filterstruktur und die Annotation der Fotografien mit historischem Kontextwissen ist der Bildatlas digitale Edition und interaktive Ausstellung zugleich. 

- id: PMJ
  title: The Persecution and Murder of the European Jews by Nazi Germany, 1933-1945 (PMJ)
  url: https://pmj-documents.org/
  icon: meeting_room
  image: pmj_neu.png
  content: |
    PMJ ist eine 16-bändige Edition historischer Dokumente in englischer Übersetzung, die die Verfolgung und Ermordung der Juden im Deutschen Reich und im gesamten nationalsozialistisch dominierten Europa von 1933 bis 1945 aus der Perspektive von Tätern, Opfern und Dritten behandelt. Wissenschaftliche Einführungen zu den wichtigsten Ereignissen und Entwicklungen sowie erläuternde Fußnoten, Biografien und Register stellen den Kontext der Dokumente her.

- id: zeitgeschichte
  title: Zeitgeschichte Open
  url: https://open.ifz-muenchen.de/home
  icon: meeting_room
  image: zeitgeschichte.open.JPG
  content: |
   Seit 2019 präsentiert das IfZ seine Open Access-Publikationen auf dem Repositorium Zeitgeschichte Open; im Dezemer 2023 erfolgte ein vollständiger Relaunch. Auf Zeitgeschichte Open sollen, gemäß der Open-Access-Policy des Instituts, sukzessive alle IfZ-Publikationen bereitgestellt werden, für die entsprechende rechtliche Voraussetzungen bestehen. 
   Neben Open-Access-Titeln werden über das Repositorium auch digitalisierte und zugangsbeschränkte Publikationen sowie Archivbestände angeboten.

- id: fbi_Interviews
  title: Interviews mit Überlebenden des KZ Buna/Monowitz
  url: https://www.fritz-bauer-institut.de/wollheim-memorial-interviews
  icon: meeting_room
  image: FBI.jpg
  content: |
   Interviews mit 24 Überlebenden des KZ Buna/Monowitz sind Teil des Wollheim Memorials. Während einer Erneuerung der [Website des Wollheim Memorials](http://www.wollheim-memorial.de) macht das Fritz Bauer Institut sie zugänglich.

- id: fbi_Tonbandmitschnitt
  title: Tonbandmitschnitt des 1. Frankfurter Auschwitz-Prozesses (1963-1965)
  url: https://www.auschwitz-prozess.de/ 
  icon: meeting_room
  image: FBI2.jpg
  content: |
   In Zusammenarbeit mit dem Hessischen Hauptstaatsarchiv Wiesbaden macht das Fritz Bauer Institut den Audio-Mitschnitt des ersten Frankfurter Auschwitz-Prozesses zugänglich.

- id: fbi_Ausstellung
  title: Ausstellung „Fritz Bauer. Der Staatsanwalt. NS-Verbrechen vor Gericht“
  url: http://fritz-bauer-der-staatsanwalt.de/
  icon: meeting_room
  image: FBI.jpg
  content: |
   Die 2014 vom Fritz Bauer Institut und dem Jüdischen Museum Frankfurt entwickelte Ausstellung wurde 2023 digitalisiert. Versionen in englischer und [Leichter Sprache](https://leichte-sprache.de/2023/07/ausstellung-ueber-fritz-bauer-in-leichter-sprache/) stehen ebenfalls zur Verfügung. 

- id: fbi_Unterrichtsmodule
  title: Online-Unterrichtsmodule zur Auseinandersetzung mit dem Holocaust
  url: https://www.fritz-bauer-institut.de/publikationen-paed
  icon: meeting_room
  image: FBI2.jpg
  content: |
   Für die Auseinandersetzung mit dem Holocaust im Schulunterricht entwickelt das Fritz Bauer Institut Unterrichtsmodule zu verschiedenen Themen, die Lehrerinnen und Lehrer kostenfrei nutzen können.

- id: fbi_Vortragsveranstaltungen
  title: Vortragsveranstaltungen am Fritz Bauer Institut, Videoaufzeichnungen
  url: https://www.fritz-bauer-institut.de/mediathek
  icon: meeting_room
  image: FBI.jpg
  content: |
   Das Fritz Bauer Institut veranstaltet regelmäßig öffentliche Vortrags- und Diskussionsveranstaltungen sowie Buchvorstellungen. Ausgewählte Veranstaltungen sind anschließend als Videoaufzeichnungen verfügbar. 
