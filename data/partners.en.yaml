  - id: ifz
    title: Leibniz Institute for Contemporary History
    url: https://www.ifz-muenchen.de/en/the-institute/about-the-institute/our-profile
    image: logo_zfhs.png
    content: |
      The Leibniz Institute for Contemporary History (IfZ) is a research institution covering 20th century German history in its European and international contexts. The Center for Holocaust Studies at the IfZ in Munich was established in 2013 and is an international competence center for Holocaust research. It organizes conferences and workshops and conducts its own research and editing projects.
  
  - id: barch
    title: Federal Archives
    url: https://www.bundesarchiv.de/EN/Navigation/Home/home.html
    image: BArch_neu.jpg
    content: |
      The Federal Archives (Bundesarchiv) is the largest archival institution in Germany. Key papers for the understanding of the Holocaust lie within its repositories. These records are accessible to users through archival finding aids and modern databases.

  - id: aa
    title: Arolsen Archives
    url: https://arolsen-archives.org/en
    image: arolsenlogo.PNG
    content: |
      The Arolsen Archives are the international center on Nazi persecution with the world’s most comprehensive archive on the victims and survivors of National Socialism. They provide easy access to a broad base of knowledge about Nazi persecution, Nazi forced labor, the Holocaust, and the consequences of discrimination and racial hatred. The collection has information on about 17.5 million people and belongs to UNESCO’s Memory of the World.

  - id: gwzo
    title: GWZO
    url: https://www.leibniz-gwzo.de/en
    image: gwzo_logo_eng.png
    content: |
      The Leibniz Institute for the History and Culture of Eastern Europe (GWZO) is one of the world’s leading research and educational institutions for the study of the history and culture of Central and Eastern Europe.

  - id: fbi
    title: Fritz Bauer Institut
    url: https://www.fritz-bauer-institut.de/en/
    image: fbi_logo.jpg
    content: |
      The Fritz Bauer Institute is an independent research and educational institution focusing on contemporary history from an interdisciplinary perspective. The institute moreover focuses on scholarly, pedagogical, ant artistic engagements with the National Socialist politics of annihilation and its aftermath reaching into the present day. 
      
  - id: dea
    title: German Exile Archive 1933-1945
    url: https://www.dnb.de/EN/Ueber-uns/DEA/dea_node.html
    image: dnb_logo.jpg
    content: |
      The German National Library’s German Exile Archive 1933–1945 is a platform for discussing the subjects of exile and emigration during the Nazi era. It collects testimonies of exile such as publications, institutional and personal legacies – from all walks of life and regardless of the prominence of the individual concerned.       
