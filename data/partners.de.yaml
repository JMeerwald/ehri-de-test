---

  - id: ifz
    title: Institut für Zeitgeschichte München-Berlin
    url: https://www.ifz-muenchen.de/das-institut/ueber-das-institut/unser-profil
    image: logo_zfhs.png
    content: |
      Das Institut für Zeitgeschichte München-Berlin (IfZ) ist eine außeruniversitäre Forschungseinrichtung, die die gesamte deutsche Geschichte des 20. Jahrhunderts bis zur Gegenwart in ihren europäischen und globalen Bezügen erforscht. Dem Zentrum für Holocaust-Studien am IfZ, einem internationalen Kompetenz- und Kommunikationszentrum für die Erforschung des Holocaust, obliegt die Koordination von EHRI-DE.

  
  - id: barch
    title: Bundesarchiv
    url: https://www.bundesarchiv.de/das-bundesarchiv/
    image: BArch_neu.jpg
    content: |
      Das Bundesarchiv ist die größte Archivinstitution in Deutschland. In den Beständen des Bundesarchivs befinden sich entscheidende Unterlagen zur Erforschung des Holocaust, die über Findbücher und moderne Datenbanken zugänglich sind. 
      
  - id: aa
    title: Arolsen Archives
    url: https://arolsen-archives.org/
    image: arolsenlogo.PNG
    content: |
      Die Arolsen Archives sind das internationale Zentrum über NS-Verfolgung mit dem weltweit umfassendsten Archiv zu den Opfern und Überlebenden des Nationalsozialismus. Sie bieten einfachen Zugang zu breitem Wissen über NS-Verfolgung, NS-Zwangsarbeit, den Holocaust sowie zu den Folgen von Diskriminierung und Rassenhass. Die Sammlung mit Hinweisen zu rund 17,5 Millionen Menschen gehört zum UNESCO-Weltdokumentenerbe.

  - id: gwzo
    title: Leibniz-Institut für Geschichte und Kultur des östlichen Europa (GWZO)
    url: https://www.leibniz-gwzo.de/de
    image: gwzo_logo_de.png
    content: |
      Das GWZO zählt zu den führenden Forschungs- und Vermittlungseinrichtungen für die Geschichte und Kultur des zentralen und östlichen Europa. Im Fokus stehen Themen, die zu den drängendsten Herausforderungen unserer Zeit gehören: Globalisierungsdynamiken und Migration, Wissensordnungen und konkurrierende Geschichtsbilder, Umwelt und Gewalt. 
      
  - id: fbi
    title: Fritz Bauer Institut
    url: https://www.fritz-bauer-institut.de/
    image: fbi_logo.jpg
    content: |
      Das Fritz Bauer Institut ist eine unabhängige Forschungs- und Bildungseinrichtung, die sich in interdisziplinärer Perspektive mit Zeitgeschichte beschäftigt. Ein Schwerpunkt des Instituts ist die wissenschaftliche, pädagogische und künstlerische Auseinandersetzung mit der nationalsozialistischen Vernichtungspolitik und ihren Folgen bis in die Gegenwart. 

  - id: dea
    title: Deutsches Exilarchiv 1933-1945
    url: https://www.dnb.de/DE/Ueber-uns/DEA/dea_node.html
    image: dnb_logo.jpg
    content: |
      Das Deutsche Exilarchiv 1933-1945 der Deutschen Nationalbibliothek ist eine Plattform für die Auseinandersetzung mit den Themen Exil und Emigration in der NS-Zeit. Es sammelt Zeugnisse des Exils wie Publikationen, institutionelle und persönliche Nachlässe - aus allen Lebensbereichen und unabhängig von der Prominenz der betroffenen Personen.    
